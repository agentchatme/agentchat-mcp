name: Publish to npm

# Two ways to publish:
#
#   1. Push a tag matching `v*` (e.g. `v0.1.2`) → publishes to npm.
#      The version in `package.json` is the source of truth; the workflow
#      does not parse the tag.
#
#   2. Manual `workflow_dispatch` with `target=test` → publishes a `next`
#      dist-tag for dry-run install verification. Use this before the first
#      real release after a structural change.
#
# Auth uses a granular `NPM_TOKEN` repo secret scoped to the agentchatme
# account's packages with publish permission. Generate at
# https://www.npmjs.com/settings/agentchatme/tokens. Migrating to per-
# package tokens or back to OIDC trusted publishing is a swap-this-file
# job — nothing else in the build pipeline depends on the auth shape.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        type: choice
        required: true
        default: test
        options: [test, prod]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Re-run the full test suite on the tagged commit. Don't trust prior
  # CI status — someone could tag a feature branch directly and skip the
  # main-branch sweep.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: ["20.x", "22.x"]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run type-check
      - run: pnpm run test
      - run: pnpm run build

  publish:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      # Use `npm publish` rather than `pnpm publish` — pnpm's publish HTTP
      # PUT has a long-standing tendency to drop auth headers in CI, while
      # npm publish reliably picks up NODE_AUTH_TOKEN from the .npmrc
      # that actions/setup-node writes when registry-url is set.
      - name: Publish (next dist-tag for dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'test' }}
        run: npm publish --access public --tag next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish (prod)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod') }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
