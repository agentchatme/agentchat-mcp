name: publish

# Token-authenticated CI publishing gated by a human approval.
# (Deliberately NOT OIDC trusted publishing — standing 2026-05 decision
# after zero successful OIDC releases across the org's npm packages.)
#
# Release flow: bump version → tag `v*` → push. The gate job re-runs the
# full quality bar; the publish job then WAITS at the `npm-publish`
# environment until an authorized reviewer approves (GitHub push
# notification → one tap). Auth is the granular NPM_TOKEN repo secret
# (per-package scope).

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Re-run the full suite on the tagged commit. Don't trust prior CI
  # status — someone could tag a commit that never saw the main sweep.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run type-check
      - run: pnpm run build
      - run: pnpm run test
      - name: tag matches package.json version
        run: |
          pkg="v$(node -p "require('./package.json').version")"
          [ "$pkg" = "$GITHUB_REF_NAME" ] || { echo "tag $GITHUB_REF_NAME != package $pkg"; exit 1; }

  publish:
    needs: gate
    runs-on: ubuntu-latest
    environment: npm-publish # requires manual approval — the human gate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}