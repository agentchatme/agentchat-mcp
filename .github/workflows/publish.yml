name: publish

# OIDC trusted publishing gated by a human approval.
# 2026-07-13: converted from token auth WITH EVIDENCE — a fresh granular
# token EOTP'd from this very pipeline; npm's hardening now demands OTP
# for ALL token writes on 2FA-enforced accounts, closing the token path.
# Supersedes the 2026-05 no-OIDC decision, with sanim's sign-off.
#
# Release flow: bump version → tag `v*` → push. The gate job re-runs the
# full quality bar; the publish job then WAITS at the `npm-publish`
# environment until an authorized reviewer approves (GitHub push
# notification → one tap). Auth is OIDC: npm trusts THIS repo+workflow+
# environment, mints per-run credentials, and attaches provenance. No
# tokens anywhere.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "stage-proof = validate pairing/OIDC/gate end-to-end via npm stage publish (never public; reject the stage on npmjs.com afterwards)"
        type: choice
        required: true
        default: stage-proof
        options: [stage-proof]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Re-run the full suite on the tagged commit. Don't trust prior CI
  # status — someone could tag a commit that never saw the main sweep.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run type-check
      - run: pnpm run build
      - run: pnpm run test
      - name: tag matches package.json version
        if: github.event_name == 'push'
        run: |
          pkg="v$(node -p "require('./package.json').version")"
          [ "$pkg" = "$GITHUB_REF_NAME" ] || { echo "tag $GITHUB_REF_NAME != package $pkg"; exit 1; }

  publish:
    needs: gate
    runs-on: ubuntu-latest
    environment: npm-publish # requires manual approval — the human gate
    permissions:
      id-token: write # OIDC exchange with npm (trusted publishing)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # OIDC exchange needs a current npm CLI
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Publish (tag push)
        if: github.event_name == 'push'
        run: npm publish --provenance --access public
      - name: Stage-proof (never public — reject the stage on npmjs.com after)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'stage-proof' }}
        run: |
          npm version "$(node -p "require('./package.json').version")-proof.${{ github.run_number }}" --no-git-tag-version
          npm stage publish --access public --tag proof