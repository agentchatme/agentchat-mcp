name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        type: choice
        required: true
        default: test
        options: [test, prod]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: ["20.x", "22.x"]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run type-check
      - run: pnpm run test
      - run: pnpm run build

  publish:
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: npm
      url: https://www.npmjs.com/package/@agentchatme/mcp
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Publish (next dist-tag for dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'test' }}
        run: pnpm publish --access public --tag next --no-git-checks --provenance

      - name: Publish (prod)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod') }}
        run: pnpm publish --access public --no-git-checks --provenance
