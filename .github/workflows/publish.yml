name: publish

# npm Trusted Publishing (OIDC) gated by a human approval.
#
# Release flow: bump version → tag `v*` → push. The gate job re-runs the
# full quality bar; the publish job then WAITS at the `npm-publish`
# environment until an authorized reviewer approves (GitHub push
# notification → one tap). No npm tokens anywhere: npm mints short-lived
# OIDC credentials for this exact repo+workflow and stamps provenance on
# the release.
#
# One-time npm-side setup (package Settings → Trusted Publisher):
#   repo agentchatme/agentchat-mcp, workflow publish.yml, environment npm-publish
# then set Publishing access to "Require two-factor authentication and
# disallow tokens" so this pipeline (and interactive humans) are the only
# publish paths.

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Re-run the full suite on the tagged commit. Don't trust prior CI
  # status — someone could tag a commit that never saw the main sweep.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run type-check
      - run: pnpm run build
      - run: pnpm run test
      - name: tag matches package.json version
        run: |
          pkg="v$(node -p "require('./package.json').version")"
          [ "$pkg" = "$GITHUB_REF_NAME" ] || { echo "tag $GITHUB_REF_NAME != package $pkg"; exit 1; }

  publish:
    needs: gate
    runs-on: ubuntu-latest
    environment: npm-publish # requires manual approval — the human gate
    permissions:
      id-token: write # OIDC exchange with npm
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # trusted publishing needs a current npm CLI
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: npm publish --provenance --access public